# RAG Builder Skill

## 触发条件

当用户提到以下关键词时触发此 skill：
- "RAG"、"知识库"、"问答系统"、"知识问答"
- "搭建 RAG"、"做知识库"、"文档问答"、"PDF 问答"
- "ChromaDB"、"向量数据库"、"Embedding"、"文向量"
- "知识助手"、"文档助手"、"制度问答"、"客服知识库"

## 技能描述

RAG (Retrieval-Augmented Generation) 知识问答助手构建指南。提供完整的技术栈、架构设计和代码模板，帮助用户快速搭建基于 ChromaDB + LlamaIndex + DashScope 的文档问答系统。

## 核心能力

1. **技术栈咨询** - 解释各组件作用和选型理由
2. **架构设计** - 提供系统架构图和数据流程
3. **代码模板** - 提供关键组件的代码片段
4. **配置指南** - API Key 配置、环境变量设置
5. **场景适配** - 针对不同场景给出参数建议
6. **故障排查** - 常见问题和解决方案

## 使用方式

用户可以直接询问：
- "如何搭建一个 RAG 知识库？"
- "RAG 系统需要什么技术栈？"
- "帮我配置一个客服知识问答系统"
- "如何优化 RAG 的检索效果？"

## 输出格式

1. 首先了解用户需求场景（内部制度/技术文档/客服等）
2. 根据场景推荐合适的配置参数
3. 提供分步骤的实施指南
4. 必要时提供代码片段

## 注意事项

- 确认用户是否有 API Key（DashScope 等）
- 询问文档格式（PDF/Word/Markdown 等）
- 了解部署环境（本地/服务器/云端）
- 评估文档规模和并发量需求
